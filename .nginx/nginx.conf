server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # Static assets — long cache (files have content hash in name)
  location ~* \.(js|css|woff2|ttf|eot|png|jpg|jpeg|webp|svg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Locales — short cache (content changes on deploy)
  location /locales/ {
    expires 1h;
    add_header Cache-Control "public";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri /index.html =404;
  }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
