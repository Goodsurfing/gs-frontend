server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Performance ───────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ─── Gzip ──────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Serve pre-compressed .gz files if available
    gzip_static on;

    # ─── Security headers ──────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options "nosniff"                          always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=(self)" always;

    # ─── Hashed assets: cache forever ──────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control        "public, immutable"                  always;
        add_header X-Frame-Options      "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header Referrer-Policy      "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy   "camera=(), microphone=(), geolocation=(self)" always;

        access_log off;
        try_files $uri =404;
    }

    # ─── Locale JSON: short cache ──────────────────────────────
    location /locales/ {
        expires 1h;
        add_header Cache-Control        "public, must-revalidate"            always;
        add_header X-Frame-Options      "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header Referrer-Policy      "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy   "camera=(), microphone=(), geolocation=(self)" always;

        try_files $uri =404;
    }

    # ─── index.html: never cache ───────────────────────────────
    location = /index.html {
        add_header Cache-Control        "no-cache, no-store, must-revalidate" always;
        add_header Pragma               "no-cache"                            always;
        expires 0;

        add_header X-Frame-Options      "SAMEORIGIN"                         always;
        add_header X-Content-Type-Options "nosniff"                          always;
        add_header Referrer-Policy      "strict-origin-when-cross-origin"    always;
        add_header Permissions-Policy   "camera=(), microphone=(), geolocation=(self)" always;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ─── Legacy vacancy URLs: /offers/host/{legacyId} ──────────
    # Проиндексированы поисковиками ещё на прежнем домене (до появления
    # old.goodsurfing.org). Резолвим legacyId -> актуальный ID через
    # gs-backend (Vacancy.legacyId), который отдаёт 301 на /ru/offer-personal/{id}.
    # Docker embedded DNS (127.0.0.11) + переменная в proxy_pass — иначе nginx
    # резолвит "backend" один раз при старте и не увидит новый IP после
    # передеплоя backend-контейнера независимо от frontend.
    location ~ ^/offers/host/\d+$ {
        resolver 127.0.0.11 valid=10s;
        set $legacy_backend "http://backend:80";
        proxy_pass $legacy_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SPA fallback ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Error pages ───────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
