version: "3.9"

services:
  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.goodsurfing.voknil.ru/}
        VITE_API_YANDEX_KEY: ${VITE_API_YANDEX_KEY:-864d6a03-13dc-41c2-a09d-66018ba34045}
        VITE_MAIN_URL: ${VITE_MAIN_URL:-https://goodsurfing.voknil.ru}
        VITE_VKID_CLIENT_ID: ${VITE_VKID_CLIENT_ID:-54011426}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gs-frontend.rule=Host(`goodsurfing.voknil.ru`)"
      - "traefik.http.routers.gs-frontend.entrypoints=websecure"
      - "traefik.http.routers.gs-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.gs-frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
