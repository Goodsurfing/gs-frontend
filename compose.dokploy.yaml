version: "3.9"

services:
  frontend:
    build:
      context: .
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-https://api.goodsurfing.voknil.ru/}
        REACT_APP_API_YANDEX_KEY: ${REACT_APP_API_YANDEX_KEY:-864d6a03-13dc-41c2-a09d-66018ba34045}
        REACT_APP_MAIN_URL: ${REACT_APP_MAIN_URL:-https://goodsurfing.voknil.ru}
        REACT_VKID_CLIENT_ID: ${REACT_VKID_CLIENT_ID:-54011426}
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.gs-frontend.rule=Host(`goodsurfing.voknil.ru`)"
      - "traefik.http.routers.gs-frontend.entrypoints=websecure"
      - "traefik.http.routers.gs-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.gs-frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
